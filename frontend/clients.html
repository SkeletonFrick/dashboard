<!DOCTYPE html>
<html lang="fr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clients — AQ Réparation</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"
    ></script>
  </head>
  <body class="bg-base-200 min-h-screen">
    <div class="drawer lg:drawer-open">
      <input id="drawer-toggle" type="checkbox" class="drawer-toggle" />
      <div class="drawer-content flex flex-col">
        <!-- Navbar mobile -->
        <div class="navbar bg-base-100 shadow lg:hidden">
          <label for="drawer-toggle" class="btn btn-ghost">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"
              />
            </svg>
          </label>
          <span class="text-lg font-bold ml-2">Clients</span>
        </div>

        <!-- Contenu principal -->
        <main class="p-4 md:p-6 flex-1">
          <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold">Clients</h1>
            <button
              class="btn btn-primary"
              onclick="openClientModal()"
            >
              + Nouveau client
            </button>
          </div>

          <!-- Filtres -->
          <div class="card bg-base-100 shadow mb-4">
            <div class="card-body p-4">
              <div class="flex flex-wrap gap-3 items-end">
                <div class="form-control flex-1 min-w-[200px]">
                  <input
                    type="text"
                    id="search-input"
                    placeholder="Nom, téléphone, email…"
                    class="input input-bordered input-sm"
                    oninput="debouncedSearch()"
                  />
                </div>
                <button
                  class="btn btn-ghost btn-sm"
                  onclick="resetFilters()"
                >
                  Réinitialiser
                </button>
              </div>
            </div>
          </div>

          <!-- Tableau -->
          <div class="card bg-base-100 shadow overflow-x-auto">
            <table class="table table-zebra w-full">
              <thead>
                <tr>
                  <th>Nom</th>
                  <th>Téléphone</th>
                  <th>Email</th>
                  <th class="text-center">Réparations</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="clients-tbody">
                <tr>
                  <td colspan="5" class="text-center py-8 text-base-content/50">
                    Chargement…
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Pagination -->
          <div
            id="pagination"
            class="flex items-center justify-between mt-4 text-sm text-base-content/70"
          ></div>
        </main>
      </div>

      <!-- Sidebar -->
      <div class="drawer-side z-40">
        <label for="drawer-toggle" class="drawer-overlay"></label>
        <aside
          class="bg-base-100 w-64 min-h-full shadow-lg flex flex-col"
        >
          <div class="p-4 border-b">
            <span class="text-xl font-bold">AQ Réparation</span>
          </div>
          <nav class="flex-1 p-2 menu">
            <li class="menu-title">Activité</li>
            <li><a href="/index.html">Dashboard</a></li>
            <li><a href="/reparations.html">Réparations</a></li>
            <li><a href="/flips.html">Flips</a></li>
            <li class="menu-title mt-2">Gestion</li>
            <li><a href="/achats.html">Achats</a></li>
            <li><a href="/ventes.html">Ventes</a></li>
            <li><a href="/stock.html">Stock</a></li>
            <li><a href="/clients.html" class="active">Clients</a></li>
            <li><a href="/fournisseurs.html">Fournisseurs</a></li>
            <li><a href="/materiel.html">Matériel</a></li>
            <li class="menu-title mt-2">Finance</li>
            <li><a href="/budget.html">Budget</a></li>
            <li><a href="/parametres.html">Paramètres</a></li>
          </nav>
          <div class="p-4 border-t">
            <div class="flex items-center gap-2 mb-2">
              <div
                class="avatar placeholder"
                id="sidebar-avatar"
              >
                <div
                  class="bg-primary text-primary-content rounded-full w-8"
                >
                  <span id="sidebar-initial">?</span>
                </div>
              </div>
              <span
                id="sidebar-username"
                class="text-sm font-medium"
              ></span>
            </div>
            <button
              class="btn btn-ghost btn-sm w-full"
              onclick="logout()"
            >
              Déconnexion
            </button>
          </div>
        </aside>
      </div>
    </div>

    <!-- Modal création/édition client -->
    <dialog id="client-modal" class="modal">
      <div class="modal-box w-full max-w-lg">
        <h3 class="font-bold text-lg mb-4" id="client-modal-title">
          Nouveau client
        </h3>
        <form id="client-form" onsubmit="submitClient(event)">
          <div class="grid grid-cols-1 gap-4">
            <div class="form-control">
              <label class="label"><span class="label-text">Nom *</span></label>
              <input
                type="text"
                name="nom"
                class="input input-bordered"
                required
              />
            </div>
            <div class="form-control">
              <label class="label"
                ><span class="label-text">Téléphone</span></label
              >
              <input
                type="tel"
                name="telephone"
                class="input input-bordered"
              />
            </div>
            <div class="form-control">
              <label class="label"><span class="label-text">Email</span></label>
              <input
                type="email"
                name="email"
                class="input input-bordered"
              />
            </div>
            <div class="form-control">
              <label class="label"><span class="label-text">Notes</span></label>
              <textarea
                name="notes"
                class="textarea textarea-bordered"
                rows="3"
              ></textarea>
            </div>
          </div>
          <div class="modal-action">
            <button
              type="button"
              class="btn btn-ghost"
              onclick="document.getElementById('client-modal').close()"
            >
              Annuler
            </button>
            <button type="submit" class="btn btn-primary">Enregistrer</button>
          </div>
        </form>
      </div>
      <form method="dialog" class="modal-backdrop">
        <button>close</button>
      </form>
    </dialog>

    <!-- Modal détail client -->
    <dialog id="client-detail-modal" class="modal">
      <div class="modal-box w-full max-w-2xl">
        <h3
          class="font-bold text-lg mb-4"
          id="detail-client-nom"
        ></h3>
        <div id="detail-client-body" class="space-y-4"></div>
        <div class="modal-action">
          <form method="dialog">
            <button class="btn">Fermer</button>
          </form>
        </div>
      </div>
      <form method="dialog" class="modal-backdrop">
        <button>close</button>
      </form>
    </dialog>

    <script type="module" src="/js/auth.js"></script>
    <script type="module" src="/js/clients.js"></script>
  </body>
</html>
