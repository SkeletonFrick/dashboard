<!doctype html>
<html lang="fr" data-theme="night">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQ Réparation — Page introuvable</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Dans le <head> de toutes les pages HTML -->
<style>
  /* Sidebar fixe desktop */
  @media (min-width: 1024px) {
    .drawer-side {
      position: sticky;
      top: 0;
      height: 100vh;
    }
  }

  /* Tableau responsive — scroll horizontal sur mobile */
  .table-responsive {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* Truncate long textes dans les cellules */
  td .truncate { max-width: 200px; }

  /* Badge statut lisible sur fond sombre et clair */
  .badge { white-space: nowrap; }

  /* Toast toujours visible */
  #toast-container {
    position: fixed;
    bottom: 1rem;
    right: 1rem;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    max-width: 24rem;
  }
</style>
  </head>
  <body class="bg-base-200 min-h-screen flex items-center justify-center">
    <div class="text-center space-y-4">
      <p class="text-8xl font-black text-primary">404</p>
      <h1 class="text-2xl font-bold">Page introuvable</h1>
      <p class="text-base-content/60">
        Cette page n'existe pas ou a été déplacée.
      </p>
      <a href="/" class="btn btn-primary mt-4">Retour au dashboard</a>
    </div>
  </body>
</html>
